# Baseline detekt config — start with defaults; tighten in follow-ups.
# Full detekt Gradle plugin wiring is optional until CI step is green.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true

complexity:
  LongMethod:
    active: false
  LongParameterList:
    active: false
  TooManyFunctions:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
