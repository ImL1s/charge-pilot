name: Bug report
description: Something is broken in the app.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: device
    attributes:
      label: Device + ROM
      description: e.g. Galaxy S24 Ultra, One UI 7.0
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version + flavor
      description: e.g. 0.1.0 (play) or 0.1.0 (full from F-Droid)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
