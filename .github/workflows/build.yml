name: build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: 'Create/update a GitHub Release containing the Full release APK'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests across all modules
        run: ./gradlew test

      - name: Lint (debug variants of both flavors)
        run: ./gradlew lintPlayDebug lintFullDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          retention-days: 14

  apk:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: play
            debugTask: assemblePlayDebug
            releaseTask: assemblePlayRelease
          - flavor: full
            debugTask: assembleFullDebug
            releaseTask: assembleFullRelease
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble ${{ matrix.flavor }} debug
        run: ./gradlew :app:${{ matrix.debugTask }}

      - name: Assemble ${{ matrix.flavor }} release (validates R8 shrink/minify keep rules; unsigned)
        run: ./gradlew :app:${{ matrix.releaseTask }}

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: charge-pilot-${{ matrix.flavor }}-debug
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk
          retention-days: 14

      - name: Upload release APK (unsigned)
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: charge-pilot-${{ matrix.flavor }}-release-unsigned
          path: app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk
          retention-days: 14

  full-release:
    name: Full flavor GitHub release
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble Full release APK
        run: ./gradlew :app:assembleFullRelease

      - name: Stage Full release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          apk_path="$(ls app/build/outputs/apk/full/release/*.apk | head -n 1)"
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref="$(printf '%s' "${ref_name}" | tr '/ ' '--')"
          short_sha="${GITHUB_SHA::7}"
          unsigned_apk="dist/charge-pilot-full-${safe_ref}-${short_sha}-unsigned.apk"
          signed_apk="dist/charge-pilot-full-${safe_ref}-${short_sha}-signed.apk"

          cleanup() {
            rm -f release-keystore.jks ks-pass.txt key-pass.txt
          }
          trap cleanup EXIT

          if [[ -n "${RELEASE_KEYSTORE_BASE64:-}" && -n "${RELEASE_KEYSTORE_PASSWORD:-}" && -n "${RELEASE_KEY_ALIAS:-}" && -n "${RELEASE_KEY_PASSWORD:-}" ]]; then
            umask 077
            printf '%s' "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > release-keystore.jks
            printf '%s' "${RELEASE_KEYSTORE_PASSWORD}" > ks-pass.txt
            printf '%s' "${RELEASE_KEY_PASSWORD}" > key-pass.txt
            apksigner="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
            "${apksigner}" sign \
              --ks release-keystore.jks \
              --ks-pass "file:ks-pass.txt" \
              --ks-key-alias "${RELEASE_KEY_ALIAS}" \
              --key-pass "file:key-pass.txt" \
              --out "${signed_apk}" \
              "${apk_path}"
            "${apksigner}" verify --verbose "${signed_apk}"
          else
            cp "${apk_path}" "${unsigned_apk}"
          fi
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload Full release artifact
        uses: actions/upload-artifact@v7
        with:
          name: charge-pilot-full-release
          path: dist/*
          retention-days: 30

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_github_release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_name="${GITHUB_REF_NAME}"
            title="Charge Pilot Full ${GITHUB_REF_NAME}"
          else
            tag_name="full-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            title="Charge Pilot Full ${GITHUB_RUN_NUMBER}"
          fi

          notes=$'Full-flavor APK built by CI. If Android signing secrets are configured, this release contains a signed APK; otherwise it contains an unsigned APK. Full includes Shizuku/root-capable modules; install only if you trust this repository and understand the permissions.'
          if gh release view "${tag_name}" >/dev/null 2>&1; then
            gh release upload "${tag_name}" dist/* --clobber
          else
            gh release create "${tag_name}" dist/* --target "${GITHUB_SHA}" --title "${title}" --notes "${notes}"
          fi
